<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Finance Hub — Link a Bank</title>
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
  </head>
  <body>
    <h1>Finance Hub — Link a Bank</h1>
    <p id="status">Requesting link token…</p>
    <button id="launch" style="display: none">Open Plaid Link</button>

    <script>
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const itemId = params.get('item_id'); // present => update-mode (re-auth) flow
      const authHeaders = token ? { Authorization: `Bearer ${token}` } : {};
      const statusEl = document.getElementById('status');
      const launchBtn = document.getElementById('launch');

      async function init() {
        const res = await fetch('/api/link/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders },
          body: JSON.stringify(itemId ? { item_id: itemId } : {}),
        });
        if (!res.ok) {
          statusEl.textContent = `Failed to create link token (HTTP ${res.status})`;
          return;
        }
        const { link_token } = await res.json();

        const handler = Plaid.create({
          token: link_token,
          onSuccess: async (public_token) => {
            if (itemId) {
              statusEl.textContent = 'Re-authentication successful, clearing status…';
              const completeRes = await fetch('/api/link/reauth-complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', ...authHeaders },
                body: JSON.stringify({ item_id: itemId }),
              });
              statusEl.textContent = completeRes.ok
                ? 'Re-linked successfully. You can close this tab.'
                : `Failed to clear status (HTTP ${completeRes.status})`;
              return;
            }

            statusEl.textContent = 'Exchanging token…';
            const exchangeRes = await fetch('/api/link/exchange', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', ...authHeaders },
              body: JSON.stringify({ public_token }),
            });
            statusEl.textContent = exchangeRes.ok
              ? 'Linked successfully. You can close this tab.'
              : `Exchange failed (HTTP ${exchangeRes.status})`;
          },
          onExit: (err) => {
            statusEl.textContent = err ? `Link exited with an error: ${err.error_message}` : 'Link exited.';
          },
        });

        statusEl.textContent = 'Ready.';
        launchBtn.style.display = 'inline-block';
        launchBtn.onclick = () => handler.open();
      }

      init().catch((err) => {
        statusEl.textContent = `Error: ${err.message}`;
      });
    </script>
  </body>
</html>
