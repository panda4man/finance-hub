name: finance-hub-laravel-dev
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
      POSTGRES_DB: finance_hub_laravel
    ports:
      - "5433:5432"
    volumes:
      - pgdata_laravel:/var/lib/postgresql/data
volumes:
  pgdata_laravel:
    external: true
    name: finance-hub-laravel_pgdata_laravel
