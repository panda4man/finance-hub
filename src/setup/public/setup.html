<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Finance Hub — Configure Plaid Credentials</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 480px; margin: 3rem auto; }
      label { display: block; margin-top: 1rem; font-weight: 600; }
      input, select { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
      button { margin-top: 1.5rem; padding: 0.6rem 1.2rem; }
      #status { margin-top: 1rem; font-weight: 600; }
      .hint { font-weight: normal; color: #666; font-size: 0.85em; }
    </style>
  </head>
  <body>
    <h1>Configure Plaid Credentials</h1>
    <p>Values you copy from the <a href="https://dashboard.plaid.com" target="_blank">Plaid dashboard</a>. Stored encrypted; takes effect immediately, no restart needed.</p>

    <form id="form">
      <label>Client ID
        <input type="text" id="client_id" autocomplete="off" />
      </label>
      <label>Secret <span class="hint" id="secret-hint"></span>
        <input type="password" id="secret" autocomplete="off" placeholder="leave blank to keep current" />
      </label>
      <label>Environment
        <select id="env">
          <option value="sandbox">sandbox</option>
          <option value="production">production</option>
        </select>
      </label>
      <label>Redirect URI <span class="hint">(only needed for OAuth institutions in production)</span>
        <input type="text" id="redirect_uri" autocomplete="off" placeholder="https://your-domain/link" />
      </label>
      <button type="submit">Save</button>
    </form>
    <p id="status"></p>

    <script>
      const token = new URLSearchParams(window.location.search).get('token');
      const authHeaders = token ? { Authorization: `Bearer ${token}` } : {};
      const statusEl = document.getElementById('status');

      async function loadCurrent() {
        const res = await fetch('/api/setup/plaid-credentials', { headers: authHeaders });
        if (!res.ok) {
          statusEl.textContent = `Failed to load current values (HTTP ${res.status})`;
          return;
        }
        const current = await res.json();
        document.getElementById('client_id').value = current.clientId ?? '';
        document.getElementById('env').value = current.env ?? 'sandbox';
        document.getElementById('redirect_uri').value = current.redirectUri ?? '';
        document.getElementById('secret-hint').textContent = current.secretMasked
          ? `(current: ${current.secretMasked})`
          : '(not set)';
      }

      document.getElementById('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        statusEl.textContent = 'Saving…';
        const body = {
          client_id: document.getElementById('client_id').value.trim(),
          secret: document.getElementById('secret').value.trim(),
          env: document.getElementById('env').value,
          redirect_uri: document.getElementById('redirect_uri').value.trim(),
        };
        const res = await fetch('/api/setup/plaid-credentials', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders },
          body: JSON.stringify(body),
        });
        if (res.ok) {
          statusEl.textContent = 'Saved. Ready to use immediately — no restart needed.';
          document.getElementById('secret').value = '';
          await loadCurrent();
        } else {
          statusEl.textContent = `Save failed (HTTP ${res.status})`;
        }
      });

      loadCurrent().catch((err) => {
        statusEl.textContent = `Error: ${err.message}`;
      });
    </script>
  </body>
</html>
