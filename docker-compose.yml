name: finance-hub-laravel

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finance}
      POSTGRES_DB: ${POSTGRES_DB:-finance_hub}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finance} -d ${POSTGRES_DB:-finance_hub}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: finance-hub-laravel-app
    restart: unless-stopped
    env_file: [.env]
    environment:
      RUN_MIGRATIONS: "1"
    depends_on:
      postgres: { condition: service_healthy }
    ports:
      - "${LARAVEL_APP_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  queue:
    build: .
    restart: unless-stopped
    env_file: [.env]
    command: ["php","artisan","queue:work","--queue=finance-sync,default","--sleep=3","--tries=1"]
    depends_on:
      postgres: { condition: service_healthy }
      app: { condition: service_healthy }

  scheduler:
    build: .
    restart: unless-stopped
    env_file: [.env]
    command: ["php","artisan","schedule:work"]
    depends_on:
      postgres: { condition: service_healthy }
      app: { condition: service_healthy }

volumes:
  pgdata:
