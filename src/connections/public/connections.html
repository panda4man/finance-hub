<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Finance Hub — Connect a Bank</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 560px; margin: 3rem auto; }
      textarea { width: 100%; min-height: 6rem; padding: 0.5rem; box-sizing: border-box; font-family: monospace; }
      button { margin-top: 1rem; padding: 0.6rem 1.2rem; }
      #status { margin-top: 1rem; font-weight: 600; }
      ul { padding-left: 1.2rem; }
      li { margin-bottom: 0.5rem; }
      .muted { color: #666; font-size: 0.85em; }
    </style>
  </head>
  <body>
    <h1>Connect a Bank</h1>
    <p>Paste a SimpleFin setup token from your bridge. If it matches accounts already connected here, the stored credential is refreshed instead of creating a duplicate.</p>

    <textarea id="setup_token" autocomplete="off" placeholder="Setup token"></textarea>
    <br />
    <button id="submit">Connect</button>
    <p id="status"></p>

    <h2>Existing connections</h2>
    <ul id="connections-list"><li class="muted">Loading…</li></ul>

    <script>
      const token = new URLSearchParams(window.location.search).get('token');
      const authHeaders = token ? { Authorization: `Bearer ${token}` } : {};
      const statusEl = document.getElementById('status');
      const listEl = document.getElementById('connections-list');

      async function loadConnections() {
        const res = await fetch('/internal/connections', { headers: authHeaders });
        if (!res.ok) {
          listEl.innerHTML = `<li>Failed to load (HTTP ${res.status})</li>`;
          return;
        }
        const rows = await res.json();
        if (rows.length === 0) {
          listEl.innerHTML = '<li class="muted">None yet.</li>';
          return;
        }
        listEl.innerHTML = rows
          .map(
            (r) =>
              `<li><strong>${r.institutionNames.join(', ') || 'Unknown institution'}</strong> — ${r.status}${r.statusDetail ? ` (${r.statusDetail})` : ''}, last synced ${r.lastSuccessfulSyncAt ?? 'never'}</li>`,
          )
          .join('');
      }

      document.getElementById('submit').addEventListener('click', async () => {
        const setupToken = document.getElementById('setup_token').value.trim();
        if (!setupToken) {
          statusEl.textContent = 'Paste a setup token first.';
          return;
        }
        statusEl.textContent = 'Connecting…';
        const res = await fetch('/api/connections', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders },
          body: JSON.stringify({ setup_token: setupToken }),
        });
        if (res.ok) {
          const result = await res.json();
          statusEl.textContent = `Connected — ${result.accountCount} account(s).`;
          document.getElementById('setup_token').value = '';
          await loadConnections();
        } else {
          statusEl.textContent = `Failed (HTTP ${res.status})`;
        }
      });

      loadConnections().catch((err) => {
        listEl.innerHTML = `<li>Error: ${err.message}</li>`;
      });
    </script>
  </body>
</html>
